name: Build for Windows, macOS, Linux

on:
  push:
    branches: [ main ]
  workflow_dispatch:       # lets you trigger a build manually from GitHub UI

jobs:

  # ── WINDOWS ────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4          # updated from v3

      - name: Setup Python 3.9
        uses: actions/setup-python@v5      # updated from v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mediapipe opencv-python pyautogui numpy Pillow
          pip install pycaw comtypes
          pip install screen-brightness-control
          pip install pyinstaller

      - name: Build Windows exe
        run: >
          pyinstaller --onefile --noconsole
          --collect-all mediapipe
          --collect-all google
          --add-data "hand_landmarker.task;."
          main.py

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4   # FIXED: was v3 (deprecated)
        with:
          name: Windows-EXE
          path: dist/main.exe

  # ── macOS ──────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mediapipe opencv-python pyautogui numpy Pillow
          pip install screen-brightness-control
          pip install pyinstaller

      - name: Build macOS binary
        run: |
          pyinstaller --onefile --noconsole \
            --collect-all mediapipe \
            --collect-all google \
            --add-data "hand_landmarker.task:." \
            main.py

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4   # FIXED: was v3 (deprecated)
        with:
          name: macOS-Binary
          path: dist/main

  # ── LINUX ──────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y alsa-utils python3-tk libgl1

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mediapipe opencv-python pyautogui numpy Pillow
          pip install screen-brightness-control
          pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --onefile \
            --collect-all mediapipe \
            --collect-all google \
            --add-data "hand_landmarker.task:." \
            main.py

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4   # FIXED: was v3 (deprecated)
        with:
          name: Linux-Binary
          path: dist/main
